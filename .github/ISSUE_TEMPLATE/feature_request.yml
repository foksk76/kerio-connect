name: Feature request
description: Suggest an improvement to the lab wrapper, docs, CI, or operator workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is difficult, confusing, repetitive, or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workaround or alternative you have already tried.
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits and what becomes easier or safer?
    validations:
      required: false
